<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>EVAA Sport Leadership</title><style>* { box-sizing: border-box; } body { margin: 0; padding: 8px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #000; background: #fff; font-size: 12px; line-height: 1.35; } h1 { color: #1B4F8C; border-bottom: 2px solid #1B4F8C; padding-bottom: 6px; margin-top: 0; margin-bottom: 10px; font-size: 1.4em; font-weight: 700; } table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 12px; } th { background: #1B4F8C; color: #fff; text-align: left; padding: 6px 10px; font-weight: 600; font-size: 12px; cursor: pointer; user-select: none; white-space: nowrap; } th:hover { background: #154070; } th .arrow { display: inline-block; width: 10px; margin-left: 4px; color: #cfd8e6; } th.sorted .arrow { color: #fff; } td { padding: 6px 10px; border-bottom: 1px solid #e0e0e0; vertical-align: top; } tr:hover td { background: #f5f8fc; } a { color: #1B4F8C; text-decoration: none; } a:hover { text-decoration: underline; } .footer { margin-top: 12px; font-size: 0.85em; color: #666; }</style></head><body><h1>EVAA Sport Leadership</h1><table id="rosterTable"><thead><tr><th data-col="0">Sport <span class="arrow">△</span></th><th data-col="1">Role <span class="arrow">△</span></th><th data-col="2">Name <span class="arrow">△</span></th><th data-col="3">Email <span class="arrow">△</span></th></tr></thead><tbody><tr><td>Football</td><td>Board Member</td><td>Casey Neville</td><td><a href="mailto:cneville@evaasports.org">cneville@evaasports.org</a></td></tr><tr><td>Football</td><td>Program Director</td><td>Jon Woodruff</td><td><a href="mailto:jwoodruff@evaasports.org">jwoodruff@evaasports.org</a></td></tr><tr><td>Football</td><td>Flag Football Coordinator</td><td>Riley Peterson</td><td><a href="mailto:rpeterson@evaasports.org">rpeterson@evaasports.org</a></td></tr></tbody></table><div class="footer">Last updated: May 3, 2026</div><script>(function(){var table=document.getElementById('rosterTable');if(!table)return;var headers=table.querySelectorAll('th');var tbody=table.querySelector('tbody');var sortState={col:-1,dir:1};function cellText(row,col){var c=row.children[col];return(c?c.textContent:'').trim().toLowerCase();}function sortByColumn(col){if(sortState.col===col){sortState.dir=-sortState.dir;}else{sortState.col=col;sortState.dir=1;}var rows=Array.prototype.slice.call(tbody.querySelectorAll('tr'));rows.sort(function(a,b){var av=cellText(a,col);var bv=cellText(b,col);if(av<bv)return -1*sortState.dir;if(av>bv)return 1*sortState.dir;return 0;});rows.forEach(function(r){tbody.appendChild(r);});updateArrows();}function updateArrows(){headers.forEach(function(h,idx){var arrow=h.querySelector('.arrow');h.classList.remove('sorted');if(idx===sortState.col){h.classList.add('sorted');arrow.textContent=sortState.dir===1?'▲':'▼';}else{arrow.textContent='△';}});}headers.forEach(function(h){h.addEventListener('click',function(){sortByColumn(parseInt(h.getAttribute('data-col'),10));});});updateArrows();})();</script></body></html>
