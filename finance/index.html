<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EVAA — Submit a Finance Request</title>

  <!-- Reuse the existing admin portal base styles for consistent EVAA look -->
  <link rel="stylesheet" href="../admin/css/styles.css" />
  <link rel="stylesheet" href="./css/finance.css" />

  <!-- MSAL.js v3 (same source as /admin/index.html — gotcha #23 about CDN choice) -->
  <script src="https://unpkg.com/@azure/msal-browser@3.20.0/lib/msal-browser.min.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <img src="../admin/assets/logo.png" class="header-logo" alt="EVAA" onerror="this.style.display='none'" />
        <h1>EVAA Finance Requests</h1>
      </div>
      <div class="header-actions">
        <span id="user-area" class="hidden">
          <span id="user-name"></span>
          <button id="sign-out-btn" class="btn-link">Sign out</button>
        </span>
      </div>
    </div>
  </header>

  <main>
    <!-- Loading view -->
    <section id="view-loading" class="view">
      <p id="loading-text">Loading…</p>
    </section>

    <!-- Sign-in view -->
    <section id="view-signin" class="view hidden">
      <div class="card" style="max-width:540px; margin: 40px auto; text-align:center;">
        <h2 style="margin-top:0;">Sign in to submit a request</h2>
        <p>Use your <strong>@evaasports.org</strong> account.</p>
        <button id="sign-in-btn" class="btn-primary" disabled>Sign in with Microsoft</button>
        <p id="signin-error" class="alert alert-error hidden"></p>
      </div>
    </section>

    <!-- Form view (rendered by app.js) -->
    <section id="view-form" class="view hidden">
      <form id="finance-form" class="finance-form" novalidate>
        <!-- Sections rendered dynamically from SCHEMA.sections -->
        <div id="form-sections"></div>

        <div id="form-alert" class="hidden"></div>

        <div class="actions">
          <button type="button" id="reset-btn" class="btn-secondary">Reset</button>
          <button type="submit" id="submit-btn" class="btn-primary">Submit request</button>
        </div>
      </form>
    </section>

    <!-- Success view -->
    <section id="view-success" class="view hidden">
      <div class="card" style="max-width:560px; margin: 40px auto; text-align:center;">
        <h2 style="margin-top:0; color:#226b1f;">✓ Request submitted</h2>
        <p>Your request has been sent to the treasurer. You'll get a confirmation email shortly.</p>
        <p id="success-ref" style="color:#666; font-size:0.9em;"></p>
        <button id="another-btn" class="btn-primary">Submit another</button>
      </div>
    </section>
  </main>

  <footer>
    Eastview Athletic Association ·
    <a href="../" style="color:inherit;">Back to directory</a>
  </footer>

  <!-- ?v=phase2 forces re-fetch after the Phase 2 deploy. Bump on any JS-shape change. -->
  <script src="./js/auth.js?v=phase3-redirect"></script>
  <script src="./js/graph.js?v=phase3-redirect"></script>
  <script src="./js/schema.js?v=phase3-redirect"></script>
  <script src="./js/app.js?v=phase3-redirect"></script>
</body>
</html>
